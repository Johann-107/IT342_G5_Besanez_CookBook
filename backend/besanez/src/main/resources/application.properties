spring.application.name=besanez

#Setup JDBC connection
spring.datasource.url=jdbc:mysql://localhost:3307/it342sysinteg

#Setup db login credentials
spring.datasource.username=root
spring.datasource.password=123456

#Auto create tables based on entities
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
 
spring.jpa.properties.hibernate.dialect = org.hibernate.dialect.MySQLDialect

#for stack trace error not to appear 
spring.web.error.include-stacktrace=never

#server.port = 8080
security.basic.enabled=false

# JWT Configuration
jwt.secret=yourSecretKeyHereMakeItLongAndSecure123!
jwt.expiration=86400000

# BCrypt Strength
bcrypt.strength=10