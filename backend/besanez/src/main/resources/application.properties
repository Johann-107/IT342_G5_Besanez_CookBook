spring.application.name=besanez

#Setup JDBC connection
spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}?sslmode=require

#Setup db login credentials
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

#Auto create tables based on entities
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=create
 
spring.jpa.properties.hibernate.dialect = org.hibernate.dialect.PostgreSQLDialect

#for stack trace error not to appear 
spring.web.error.include-stacktrace=never

#server.port = 8080
security.basic.enabled=false

# JWT Configuration
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# BCrypt Strength
bcrypt.strength=10

# Google Client
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=profile,email

spring.security.oauth2.client.provider.google.authorization-uri=https://accounts.google.com/o/oauth2/v2/auth?prompt=consent

#Cloudinary configuration
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}